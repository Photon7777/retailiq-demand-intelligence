services:
  streamlit:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    ports:
      - "8501:8501"
    command: >
      bash -lc "pip install --no-cache-dir -r requirements.txt &&
      streamlit run app/streamlit_app.py
      --server.address=0.0.0.0
      --server.port=8501"

