version: 2

sources:
  - name: raw
    database: RETAILIQ_DB
    schema: RAW
    tables:
      - name: sales
        columns:
          - name: store
            tests:
              - not_null
          - name: dept
            tests:
              - not_null
          - name: date
            tests:
              - not_null
      - name: stores
        columns:
          - name: store
            tests:
              - not_null
              - unique
      - name: features
        columns:
          - name: store
            tests:
              - not_null
          - name: date
            tests:
              - not_null
      - name: inventory
        columns:
          - name: store
            tests:
              - not_null
          - name: dept
            tests:
              - not_null
          - name: date
            tests:
              - not_null
  - name: ml
    database: RETAILIQ_DB
    schema: ML
    tables:
      - name: demand_forecasts
        columns:
          - name: store
            tests:
              - not_null
          - name: dept
            tests:
              - not_null
          - name: forecast_date
            tests:
              - not_null
          - name: model_version
            tests:
              - not_null
      - name: stockout_risk
        columns:
          - name: store
            tests:
              - not_null
          - name: dept
            tests:
              - not_null
          - name: risk_date
            tests:
              - not_null
          - name: risk_category
            tests:
              - not_null
      - name: sales_anomalies
        columns:
          - name: store
            tests:
              - not_null
          - name: dept
            tests:
              - not_null
          - name: sales_date
            tests:
              - not_null

models:
  - name: stg_sales
    description: Cleaned weekly sales records by store, department, and date.
    columns:
      - name: store_id
        tests:
          - not_null
      - name: dept_id
        tests:
          - not_null
      - name: sales_date
        tests:
          - not_null

  - name: stg_stores
    description: Cleaned store attributes.
    columns:
      - name: store_id
        tests:
          - not_null
          - unique

  - name: stg_inventory
    description: Cleaned synthetic inventory records.
    columns:
      - name: store_id
        tests:
          - not_null
      - name: dept_id
        tests:
          - not_null
      - name: inventory_date
        tests:
          - not_null

  - name: int_sales_features
    description: Store-department weekly sales enriched with store attributes and external features.
    columns:
      - name: store_id
        tests:
          - not_null
      - name: dept_id
        tests:
          - not_null
      - name: sales_date
        tests:
          - not_null

  - name: dim_store
    description: Store dimension used by dashboard and model marts.
    columns:
      - name: store_id
        tests:
          - not_null
          - unique

  - name: dim_date
    description: Date dimension derived from sales, feature, and inventory dates.
    columns:
      - name: date_day
        tests:
          - not_null
          - unique

  - name: fact_sales
    description: Weekly sales fact table.
    columns:
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: sales_date
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_day

  - name: fact_inventory
    description: Inventory fact table for stockout analysis.
    columns:
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: inventory_date
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_day

  - name: fact_demand
    description: Demand analysis fact combining observed sales and available inventory.
    columns:
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: demand_date
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_day

  - name: fact_forecast
    description: Forecast output fact table generated by the Phase 2 Python model.
    columns:
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: forecast_date
        tests:
          - not_null
      - name: predicted_demand
        tests:
          - not_null
      - name: model_version
        tests:
          - not_null

  - name: fact_stockout_risk
    description: Stockout risk scores generated from model forecasts and inventory.
    columns:
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: risk_date
        tests:
          - not_null
      - name: risk_category
        tests:
          - not_null

  - name: fact_anomalies
    description: Sales anomaly scores generated by the Phase 2 anomaly workflow.
    columns:
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: sales_date
        tests:
          - not_null
      - name: is_anomaly
        tests:
          - not_null
